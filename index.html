<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruiping Wang | Systems & Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --ink: #0b0a08;
      --band: #100f0d;
      --panel: #14120f;
      --panel-soft: #1d1a15;
      --panel-hover: #2a251f;
      --line: #3a3328;
      --muted: #a49a8b;
      --body-muted: #b8ad9e;
      --body: #d8cfbf;
      --subtle: #8f8374;
      --faint: #756b5e;
      --ghost: #5f5548;
      --paper: #f1eadc;
      --copper: #c7783b;
      --teal: #6bb6a8;
      --grid-x: rgba(255, 255, 255, 0.025);
      --grid-y: rgba(255, 255, 255, 0.018);
      --panel-grid: rgba(241, 234, 220, 0.05);
      --scroll-hover: #5c4a37;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --ink: #f5efe3;
      --band: #ebe1d0;
      --panel: #fffaf0;
      --panel-soft: #efe5d2;
      --panel-hover: #e3d4bf;
      --line: #cdbca7;
      --muted: #756958;
      --body-muted: #5d5346;
      --body: #322a21;
      --subtle: #7b6d5b;
      --faint: #918371;
      --ghost: #a99680;
      --paper: #1f1a14;
      --copper: #a55224;
      --teal: #28766c;
      --grid-x: rgba(54, 39, 24, 0.07);
      --grid-y: rgba(54, 39, 24, 0.045);
      --panel-grid: rgba(31, 26, 20, 0.06);
      --scroll-hover: #a99680;
    }

    .font-fraunces {
      font-family: 'Fraunces', serif;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background:
        linear-gradient(90deg, var(--grid-x) 1px, transparent 1px),
        linear-gradient(180deg, var(--grid-y) 1px, transparent 1px),
        var(--ink);
      background-size: 44px 44px;
      transition: background-color 240ms ease, color 240ms ease;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--ink);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-hover);
    }

    /* Markdown basic styles for the chat */
    .prose-chat strong {
      color: var(--paper);
      font-weight: 700;
    }

    .prose-chat p {
      margin-bottom: 0.5rem;
    }

    .prose-chat p:last-child {
      margin-bottom: 0;
    }

    .prose-chat ul {
      list-style-type: disc;
      margin-left: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .prose-chat li {
      margin-bottom: 0.25rem;
    }

    /* Scroll animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scroll-hidden {
      opacity: 0;
      transform: translateY(32px);
    }

    .scroll-visible {
      animation: fadeInUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.4"
  }
}
</script>
</head>

<body class="bg-[var(--ink)] text-[var(--paper)] antialiased selection:bg-[var(--copper)] selection:text-[var(--ink)]">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
