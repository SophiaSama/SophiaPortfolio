<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruiping Wang | Systems & Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --ink: #2b2e2d;
      --band: #333635;
      --panel: #3a3d3c;
      --panel-soft: #444746;
      --panel-hover: #4e5251;
      --line: #5a5f5e;
      --muted: #a6a9a7;
      --body-muted: #babdba;
      --body: #d2d5d3;
      --subtle: #8c908e;
      --faint: #737775;
      --ghost: #5e6260;
      --paper: #e6e8e6;
      --copper: #ccb9a8;
      --teal: #8ca398;
      --grid-x: rgba(255, 255, 255, 0.03);
      --grid-y: rgba(255, 255, 255, 0.02);
      --panel-grid: rgba(230, 232, 230, 0.05);
      --scroll-hover: #6a6e6c;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --ink: #f0ebe4;
      --band: #e8e2d9;
      --panel: #f8f5f0;
      --panel-soft: #dfd8ce;
      --panel-hover: #d2cac0;
      --line: #c5beb4;
      --muted: #7a756e;
      --body-muted: #66635c;
      --body: #4a4844;
      --subtle: #8a857d;
      --faint: #9e9a93;
      --ghost: #b3b0a9;
      --paper: #3d3b38;
      --copper: #ae8b74;
      --teal: #688c83;
      --grid-x: rgba(74, 72, 68, 0.06);
      --grid-y: rgba(74, 72, 68, 0.04);
      --panel-grid: rgba(61, 59, 56, 0.05);
      --scroll-hover: #b3b0a9;
    }

    .font-fraunces {
      font-family: 'Fraunces', serif;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background-color: var(--ink);
      color: var(--paper);
      transition: background-color 240ms ease, color 240ms ease;
    }

    /* Noise texture overlay */
    .texture-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--ink);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-hover);
    }

    /* Markdown basic styles for the chat */
    .prose-chat strong {
      color: var(--paper);
      font-weight: 700;
    }

    .prose-chat p {
      margin-bottom: 0.5rem;
    }

    .prose-chat p:last-child {
      margin-bottom: 0;
    }

    .prose-chat ul {
      list-style-type: disc;
      margin-left: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .prose-chat li {
      margin-bottom: 0.25rem;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.4"
  }
}
</script>
</head>

<body class="bg-[var(--ink)] text-[var(--paper)] antialiased selection:bg-[var(--copper)] selection:text-[var(--ink)]">
  <div class="texture-overlay mix-blend-difference dark:mix-blend-plus-lighter"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
